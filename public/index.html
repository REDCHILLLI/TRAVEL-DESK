<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Your custom CSS file, if needed -->
    <style>
        /* Basic styling for login form and dashboard */
        
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 20px;
        }
        
        #loginContainer {
            max-width: 400px;
            margin: 50px auto;
        }
        
        #dashboard {
            display: none;
            margin-top: 20px;
        }
        
        h1,
        h3 {
            color: #333;
        }
        
        .btn-custom {
            margin-right: 10px;
        }
    </style>
</head>

<body>
    <!-- Login Container: Using Bootstrap Card -->
    <div id="loginContainer" class="card p-4 shadow-sm bg-light">
        <div class="card-body">
            <h2 class="card-title text-center">Login</h2>
            <form id="loginForm">
                <div class="mb-3">
                    <label for="username" class="form-label">Username:</label>
                    <input type="text" id="username" name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password:</label>
                    <input type="password" id="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>
            <p id="errorMessage" class="text-danger mt-2"></p>
        </div>
    </div>

    <!-- Dashboard Content: Using Bootstrap Container -->
    <div id="dashboard" class="container">
        <div class="row">
            <div class="col-12 d-flex justify-content-between align-items-center">
                <h1 class="text-primary">Admin Dashboard</h1>
                <button id="logoutBtn" class="btn btn-secondary">Logout</button>
                <!-- New Logout Button -->
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-6">
                <select id="collectionSelect" class="form-select">
                    <option value="users">Users</option>
                    <option value="tours">Tours</option>
                    <option value="blogs">Blogs</option>
                    <option value="bookings">Bookings</option>
                    <option value="contacts">Contacts</option>
                    <option value="review">Reviews</option>
                </select>
            </div>
            <div class="col-md-6 d-flex align-items-center justify-content-end">
                <button id="loadBtn" class="btn btn-success btn-custom">Load Data</button>
            </div>
        </div>

        <div id="formContainer" class="mb-4"></div>

        <div class="row mb-3">
            <div class="col-12">
                <button id="addBtn" class="btn btn-primary btn-custom">Add</button>
                <button id="updateBtn" class="btn btn-warning btn-custom">Update</button>
                <button id="deleteBtn" class="btn btn-danger btn-custom">Delete</button>
            </div>
        </div>

        <h3 class="mt-4">Existing Records</h3>
        <table id="dataTable" class="table table-striped table-bordered">
            <thead class="table-light">
                <tr>
                    <!-- Dynamic headers can be added here -->
                </tr>
            </thead>
            <tbody>
                <!-- Table body will be populated dynamically -->
            </tbody>
        </table>
    </div>

    <!-- Bootstrap JS and your script -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
